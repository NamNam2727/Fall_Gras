<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fall Gras</title>
    
    <!-- Gravity SDK の読み込み -->
    <script src="https://cdn.gravity.place/fe/sdk/index-1.0.2.min.js"></script>
    
    <style>
        /* ベーススタイル */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #87CEEB; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* =========================================
           ゲーム起動までのUI (SDK.html風デザイン)
           ========================================= */
        #startup-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://cdn.gravity.place/aiugc/game/material/2026-07-10/a180d78d-d91f-4bb1-a0b9-d1df5777a393.jpeg') center/cover no-repeat;
            z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-family: sans-serif;
        }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .screen.active { display: flex; }
        
        /* ローディング用の半透明枠 */
        .loading-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #555;
            border-radius: 12px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .title-logo { font-size: 36px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,255,255,0.5); color: #fff; text-align: center; }
        .sys-msg { margin-top: 10px; font-size: 14px; color: #ffaa00; height: 20px; text-align: center; }

        /* ロビーパネルの背景をより濃く（不透明に）変更 */
        .room-panel { background: rgba(0,0,0,0.85); border: 1px solid #555; border-radius: 10px; padding: 20px; width: 90%; max-width: 400px; max-height: 90%; display: flex; flex-direction: column; position: relative; pointer-events: auto; }
        .room-header { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px;}
        
        /* ルームID入室エリア */
        .join-id-group { margin-bottom: 15px; display: flex; gap: 8px; }
        .join-id-group input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #555; background: #222; color: white; font-size: 14px; outline: none; }
        .join-id-group button { background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .join-id-group button:active { transform: scale(0.95); }

        /* ルーム作成ボタン */
        .create-btn-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; width: 100%; }
        .btn-create { background-color: #e94560; color: white; border: none; border-radius: 8px; padding: 10px 0; font-size: 14px; font-weight: bold; cursor: pointer; flex: 1; transition: background-color 0.2s; }
        .btn-create:active { background-color: #c8304a; transform: scale(0.95); }
        .btn-create.private { background-color: #0f3460; border: 1px solid #00ffff; }
        
        /* 一覧エリア */
        .room-list-container { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 6px; padding: 10px; min-height: 160px; margin-bottom: 15px; }
        .room-item { background: #2a2a35; border: 1px solid #444; border-radius: 6px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .room-info { display: flex; flex-direction: column; gap: 4px; }
        .room-id { font-weight: bold; font-size: 14px; }
        .room-players { font-size: 12px; color: #aaa; }
        
        .btn-join { background: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-join:active { background: #388E3C; transform: scale(0.95); }
        .empty-text { text-align: center; color: #777; font-size: 14px; padding: 20px 0; }
        
        /* ローカルプレイボタン */
        .btn-secondary { background: transparent; color: #aaa; border: 1px solid #555; padding: 10px 20px; border-radius: 20px; cursor: pointer; align-self: center; font-size: 14px; transition: 0.2s; width: 100%; font-weight: bold; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div id="startup-ui">
    
    <div id="screen-loading" class="screen active">
        <!-- 半透明枠を追加 -->
        <div class="loading-panel">
            <div class="title-logo">Loading...</div>
            <div class="sys-msg" id="loading-msg">通信環境を確認しています...</div>
        </div>
    </div>

    <div id="screen-room" class="screen">
        <div class="room-panel">
            <div class="room-header">マルチプレイ ロビー</div>
            
            <div class="join-id-group">
                <input type="text" id="input-room-id" placeholder="ルームIDを入力">
                <button id="btn-join-by-id">IDで入室</button>
            </div>

            <div class="create-btn-container">
                <button id="btn-create-public" class="btn-create">公開<br>ルーム作成</button>
                <button id="btn-create-private" class="btn-create private">非公開<br>ルーム作成</button>
            </div>
            
            <div style="font-size:14px; margin-bottom:5px; color:#aaa; display:flex; justify-content:space-between; align-items:center;">
                公開ルーム一覧
                <button id="btn-refresh" style="background:none; border:1px solid #555; color:#ccc; border-radius:4px; padding:2px 8px; cursor:pointer; font-size:12px;">更新</button>
            </div>
            <div class="room-list-container" id="room-list">
                <div class="empty-text">公開されている部屋がありません。</div>
            </div>
            
            <button id="btn-local-play" class="btn-secondary">ローカルでプレイ (1人用)</button>
        </div>
    </div>
</div>

<script src="https://namnam2727.github.io/Fall_Gras/gravity_setup.js?v=3"></script>

</body>
</html>
